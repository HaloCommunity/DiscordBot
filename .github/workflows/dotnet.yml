name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/HaloCommunityBot/HaloCommunityBot.csproj

      - name: Build
        run: dotnet build src/HaloCommunityBot/HaloCommunityBot.csproj --configuration Release --no-restore

      # - name: Test
      #   run: dotnet test tests/HaloCommunityBot.Tests --no-build --verbosity normal
