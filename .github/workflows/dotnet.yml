name: .NET CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet-version: '9.0.313'
            roll-forward: 'LatestMinor'
          - dotnet-version: '10.0.x'
            roll-forward: 'Major'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        env:
          DOTNET_ROLL_FORWARD: ${{ matrix.roll-forward }}
        run: dotnet restore src/HaloCommunityBot/HaloCommunityBot.csproj

      - name: Build
        env:
          DOTNET_ROLL_FORWARD: ${{ matrix.roll-forward }}
        run: dotnet build src/HaloCommunityBot/HaloCommunityBot.csproj --configuration Release --no-restore

      # - name: Test
      #   run: dotnet test tests/HaloCommunityBot.Tests --no-build --verbosity normal
